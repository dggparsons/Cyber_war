version: '3.9'
services:
  backend:
    build: ./api
    env_file:
      - api/.env.docker
    volumes:
      - backend-data:/app/instance
    ports:
      - "5050:5050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/api/health/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5050
    ports:
      - "4173:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
