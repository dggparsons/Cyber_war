version: '3.9'
services:
  backend:
    build: ./api
    env_file:
      - api/.env.docker
    volumes:
      - backend-data:/app/instance
    ports:
      - "5050:5050"

  frontend:
    build: ./client
    environment:
      - VITE_API_BASE_URL=http://localhost:5050
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  backend-data:
